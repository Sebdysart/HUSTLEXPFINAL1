# SwiftLint configuration for HustleXP iOS
# See: https://github.com/realm/SwiftLint

included:
  - "hustleXP final1"

excluded:
  - Pods
  - DerivedData
  - .build
  - "hustleXP final1Tests"
  - "hustleXP final1UITests"

# Rules
disabled_rules:
  - trailing_whitespace    # Handled by Xcode formatter
  - todo                   # TODOs are acceptable during development

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - array_init
  - collection_alignment

# Severity
force_cast: warning
force_try: warning
force_unwrapping: warning
implicitly_unwrapped_optional:
  severity: warning

# Lengths
line_length:
  warning: 140
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 400
  error: 800

cyclomatic_complexity:
  warning: 15
  error: 25

# Naming
identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - db
    - x
    - y
    - z
    - vm
