name: iOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -project "hustleXP final1.xcodeproj" \
            -scheme "hustleXP final1" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: Run Tests
        run: |
          xcodebuild test \
            -project "hustleXP final1.xcodeproj" \
            -scheme "hustleXP final1" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: SwiftLint
        run: |
          brew install swiftlint 2>/dev/null || true
          swiftlint lint --strict "hustleXP final1/" || true
        continue-on-error: true
