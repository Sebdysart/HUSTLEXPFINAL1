name: TestFlight Upload

# Intentionally NOT triggered on every push to main (this ships real builds to
# testers). Trigger it deliberately: run "TestFlight Upload" from the Actions
# tab, or push a beta tag like v1.2.6-beta1.
on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'What to test in this build'
        required: false
        default: 'Internal beta build'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-26   # Xcode 26.x + iOS 26 SDK
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app \
            || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Inject Team ID into ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "$APPLE_TEAM_ID" ] || { echo "::error::APPLE_TEAM_ID not set"; exit 1; }
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${APPLE_TEAM_ID}/" ExportOptions.plist

      - name: Import signing certificate & provisioning profile
        env:
          CERT_P12: ${{ secrets.BUILD_CERTIFICATE_P12 }}
          CERT_PWD: ${{ secrets.P12_PASSWORD }}
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          for v in CERT_P12 CERT_PWD PROFILE_B64 KEYCHAIN_PWD; do
            [ -n "${!v}" ] || { echo "::error::$v secret not set"; exit 1; }
          done
          CERT="$RUNNER_TEMP/dist.p12"
          KC="$RUNNER_TEMP/signing.keychain-db"
          echo "$CERT_P12"    | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PWD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KC"
          security import "$CERT" -P "$CERT_PWD" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed s/\"//g)
          # install the provisioning profile (both legacy + modern locations)
          PROF="$RUNNER_TEMP/p.mobileprovision"
          echo "$PROFILE_B64" | base64 --decode > "$PROF"
          UUID=$(security cms -D -i "$PROF" | plutil -extract UUID raw -)
          for d in "$HOME/Library/MobileDevice/Provisioning Profiles" \
                   "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            mkdir -p "$d"; cp "$PROF" "$d/$UUID.mobileprovision"
          done
          echo "Installed profile UUID $UUID"
          security find-identity -v -p codesigning "$KC"

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          [ -n "$ASC_KEY_CONTENT" ] || { echo "::error::APP_STORE_CONNECT_API_KEY_CONTENT not set"; exit 1; }
          echo "$ASC_KEY_CONTENT" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Build, sign & upload to TestFlight
        env:
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          SIGN_IDENTITY: "Apple Distribution"
          PROFILE_NAME: "HustleXP App Store CI"
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x scripts/build-testflight.sh
          ./scripts/build-testflight.sh

      - name: Clean up secrets from runner
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/dist.p12" "$RUNNER_TEMP/p.mobileprovision"
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

      - name: Upload build logs + archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-build-output
          path: |
            build/*.log
            build/HustleXP.xcarchive
          retention-days: 14
          if-no-files-found: ignore
